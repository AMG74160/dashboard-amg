<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Dons AMG v3.9.0</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e1a;
    --bg-card: #111827;
    --bg-card-alt: #0f1629;
    --border: #1e293b;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-blue: #38bdf8;
    --accent-green: #4ade80;
    --accent-orange: #fb923c;
    --accent-red: #f87171;
    --accent-purple: #a78bfa;
    --accent-cyan: #22d3ee;
    --accent-gold: #fbbf24;
    --gradient-blue: linear-gradient(135deg, #0ea5e9, #38bdf8);
    --gradient-green: linear-gradient(135deg, #22c55e, #4ade80);
    --gradient-orange: linear-gradient(135deg, #f97316, #fb923c);
    --gradient-red: linear-gradient(135deg, #ef4444, #f87171);
    --gradient-purple: linear-gradient(135deg, #7c3aed, #a78bfa);
    --font-main: 'DM Sans', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --radius: 12px;
    --radius-lg: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-main); background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
  .noise-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
  .container { max-width: 1440px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
  .header h1 { font-size: 26px; font-weight: 700; background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
  .header-meta { display: flex; align-items: center; gap: 12px; color: var(--text-muted); font-size: 13px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); animation: pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .refresh-btn { background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2); color: var(--accent-blue); padding: 6px 14px; border-radius: var(--radius); font-family: var(--font-main); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .refresh-btn:hover { background: rgba(56,189,248,0.2); }
  .count-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(56,189,248,0.12); color: var(--accent-blue); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-family: var(--font-mono); font-weight: 700; }

  /* ═══ CONSOLIDATED BAR ═══ */
  .consolidated-bar { background: linear-gradient(135deg, #111827 0%, #1a1f36 100%); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 28px; margin-bottom: 24px; display: flex; align-items: center; gap: 32px; flex-wrap: wrap; position: relative; overflow: hidden; }
  .consolidated-bar::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-green)); }
  .consolidated-bar .cb-icon { font-size: 32px; flex-shrink: 0; }
  .consolidated-bar .cb-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 2px; }
  .consolidated-bar .cb-value { font-size: 26px; font-weight: 700; font-family: var(--font-mono); letter-spacing: -1px; }
  .consolidated-bar .cb-label { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .cb-divider { width: 1px; height: 48px; background: var(--border); flex-shrink: 0; }
  .cb-progress { flex: 1; min-width: 200px; }
  .cb-progress-bar { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin-top: 6px; display: flex; }
  .cb-progress-fill-blue { height: 100%; background: var(--gradient-blue); transition: width 1.5s ease-out; }
  .cb-progress-fill-purple { height: 100%; background: var(--gradient-purple); transition: width 1.5s ease-out; }
  .cb-progress-legend { display: flex; gap: 16px; margin-top: 6px; font-size: 10px; color: var(--text-muted); }
  .cb-progress-legend span { display: flex; align-items: center; gap: 4px; }
  .cb-progress-legend .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* ═══ DUAL COLUMNS ═══ */
  .dual-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 1000px) { .dual-columns { grid-template-columns: 1fr; } }

  .channel-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .channel-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .channel-header h2 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .channel-header .ch-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .channel-header.blue { background: linear-gradient(135deg, rgba(14,165,233,0.12), rgba(56,189,248,0.06)); border-bottom: 1px solid rgba(56,189,248,0.15); }
  .channel-header.blue h2 { color: var(--accent-blue); }
  .channel-header.blue .ch-badge { background: rgba(56,189,248,0.15); color: var(--accent-blue); }
  .channel-header.purple { background: linear-gradient(135deg, rgba(124,58,237,0.12), rgba(167,139,250,0.06)); border-bottom: 1px solid rgba(167,139,250,0.15); }
  .channel-header.purple h2 { color: var(--accent-purple); }
  .channel-header.purple .ch-badge { background: rgba(167,139,250,0.15); color: var(--accent-purple); }

  .channel-body { padding: 20px; }
  .channel-kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .ck { padding: 12px; border-radius: var(--radius); background: rgba(255,255,255,0.02); border: 1px solid var(--border); }
  .ck-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 4px; }
  .ck-value { font-size: 22px; font-weight: 700; font-family: var(--font-mono); letter-spacing: -0.5px; }
  .ck-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .channel-gauge { display: flex; flex-direction: column; align-items: center; padding: 8px 0; }
  .channel-gauge .gauge-wrapper { position: relative; width: 180px; height: 110px; }
  .channel-gauge .gauge-svg { width: 180px; height: 110px; }
  .gauge-bg { fill: none; stroke: #1e293b; stroke-width: 14; stroke-linecap: round; }
  .gauge-fill { fill: none; stroke-width: 14; stroke-linecap: round; transition: stroke-dashoffset 1.5s ease-out; }
  .channel-gauge .gauge-center { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); font-family: var(--font-mono); font-size: 28px; font-weight: 700; }
  .channel-gauge .gauge-labels { display: flex; justify-content: space-between; width: 180px; font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
  .channel-gauge .gauge-detail { margin-top: 8px; font-size: 12px; color: var(--text-secondary); text-align: center; }
  .channel-gauge .gauge-detail strong { color: var(--text-primary); font-family: var(--font-mono); }

  .channel-statuts { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
  .cs { text-align: center; padding: 6px 12px; border-radius: var(--radius); background: rgba(255,255,255,0.02); border: 1px solid var(--border); min-width: 64px; }
  .cs-val { font-family: var(--font-mono); font-weight: 700; font-size: 16px; }
  .cs-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

  /* ═══ GRIDS ═══ */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 1000px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; transition: border-color 0.3s; }
  .card:hover { border-color: #2d3a50; }
  .section-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
  .section-divider { height: 1px; background: var(--border); margin: 4px 0 24px; }

  /* ═══ STACKED BARS ═══ */
  .chart-container { position: relative; height: 260px; padding-top: 8px; }
  .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 220px; padding: 0 4px; }
  .chart-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .chart-stack { width: 100%; display: flex; flex-direction: column-reverse; border-radius: 4px 4px 0 0; overflow: hidden; cursor: pointer; transition: opacity 0.2s; }
  .chart-stack:hover { opacity: 0.85; }
  .chart-seg { min-height: 0; transition: height 0.8s ease-out; }
  .chart-seg.blue { background: var(--accent-blue); }
  .chart-seg.purple { background: var(--accent-purple); }
  .chart-bar-label { font-size: 9px; color: var(--text-muted); font-family: var(--font-mono); white-space: nowrap; text-align: center; }
  .chart-bar-value { font-size: 9px; color: var(--text-secondary); font-family: var(--font-mono); text-align: center; white-space: nowrap; }
  .chart-legend { display: flex; gap: 16px; justify-content: center; margin-top: 10px; font-size: 11px; color: var(--text-muted); }
  .chart-legend span { display: flex; align-items: center; gap: 5px; }
  .chart-legend .dot { width: 10px; height: 10px; border-radius: 3px; }

  /* ═══ TIMELINE ═══ */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item { display: grid; grid-template-columns: 80px 1fr auto; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); align-items: center; }
  .timeline-item:last-child { border-bottom: none; }
  .timeline-date { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .timeline-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .timeline-source { font-size: 10px; color: var(--text-muted); margin-top: 1px; display: flex; align-items: center; gap: 4px; }
  .source-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .source-dot.ha { background: var(--accent-green); }
  .source-dot.vir { background: var(--accent-blue); }
  .source-dot.pp { background: var(--accent-orange); }
  .source-dot.man { background: var(--accent-purple); }
  .timeline-amount { font-size: 14px; font-weight: 700; font-family: var(--font-mono); color: var(--accent-green); white-space: nowrap; }
  .timeline-badge { font-size: 8px; padding: 1px 5px; border-radius: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .timeline-badge.classique { background: rgba(56,189,248,0.12); color: var(--accent-blue); }
  .timeline-badge.c10k { background: rgba(167,139,250,0.12); color: var(--accent-purple); }

  /* ═══ ALERTS ═══ */
  .alerts-list { display: flex; flex-direction: column; gap: 6px; max-height: 400px; overflow-y: auto; }
  .alert-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); border: 1px solid; }
  .alert-item.critical { border-color: rgba(248,113,113,0.25); background: rgba(248,113,113,0.06); }
  .alert-item.warning { border-color: rgba(251,146,60,0.25); background: rgba(251,146,60,0.06); }
  .alert-icon { font-size: 16px; flex-shrink: 0; }
  .alert-info { flex: 1; min-width: 0; }
  .alert-name { font-size: 13px; font-weight: 600; }
  .alert-detail { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .alert-amount { font-size: 14px; font-weight: 700; font-family: var(--font-mono); color: var(--accent-red); white-space: nowrap; }
  .alert-amount.warning-color { color: var(--accent-orange); }

  /* ═══ BADGES ═══ */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .badge.complet { background: rgba(74,222,128,0.12); color: var(--accent-green); }
  .badge.partiel { background: rgba(251,146,60,0.12); color: var(--accent-orange); }
  .badge.nonpaye { background: rgba(248,113,113,0.12); color: var(--accent-red); }
  .badge.spontane { background: rgba(167,139,250,0.12); color: var(--accent-purple); }
  .badge.donrecu { background: rgba(167,139,250,0.12); color: var(--accent-purple); }

  /* ═══ SOURCE BARS ═══ */
  .source-bar-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
  .source-bar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 14px; }
  .source-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease-out; }

  /* ═══ TABLE ═══ */
  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; font-weight: 600; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-card); z-index: 2; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
  tr:hover td { background: rgba(255,255,255,0.02); }
  td.amount { font-family: var(--font-mono); font-weight: 600; text-align: right; }
  .controls { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-box { flex: 1; min-width: 200px; padding: 10px 14px; border-radius: var(--radius); background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); font-family: var(--font-main); font-size: 14px; outline: none; }
  .search-box:focus { border-color: var(--accent-blue); }
  .search-box::placeholder { color: var(--text-muted); }
  .filter-btn { padding: 10px 16px; border-radius: var(--radius); background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-secondary); font-family: var(--font-main); font-size: 13px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(56,189,248,0.05); }

  /* ═══ DONUT ═══ */
  .donut-container { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .donut-svg { width: 140px; height: 140px; transform: rotate(-90deg); }
  .donut-legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .legend-value { font-family: var(--font-mono); font-weight: 600; margin-left: auto; padding-left: 12px; }

  .empty-state { color: var(--text-muted); text-align: center; padding: 32px 16px; font-size: 13px; }

  /* ═══ LOGIN ═══ */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--accent-red); margin: 40px 0; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: #334155; }
</style>
</head>
<body>
<div class="noise-overlay"></div>

<!-- 🔒 LOGIN -->
<div id="loginScreen" style="display:flex;justify-content:center;align-items:center;min-height:100vh;position:relative;z-index:10;">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;width:100%;max-width:420px;text-align:center;">
    <div style="font-size:48px;margin-bottom:16px;">🕌</div>
    <h2 style="font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent-blue),var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;">Dashboard Dons AMG</h2>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:28px;">Connectez-vous pour accéder au tableau de bord</p>
    <input type="text" id="loginInput" placeholder="Identifiant (admin uniquement)" autocomplete="username"
      style="width:100%;padding:12px 16px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-family:var(--font-main);font-size:14px;outline:none;margin-bottom:12px;"
      onfocus="this.style.borderColor='var(--accent-blue)'" onblur="this.style.borderColor='var(--border)'" />
    <input type="password" id="passwordInput" placeholder="Mot de passe" autocomplete="current-password"
      style="width:100%;padding:12px 16px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-family:var(--font-mono);font-size:14px;outline:none;margin-bottom:16px;"
      onfocus="this.style.borderColor='var(--accent-blue)'" onblur="this.style.borderColor='var(--border)'" />
    <button id="loginBtn" onclick="attemptLogin()"
      style="width:100%;padding:12px;background:var(--gradient-blue);border:none;border-radius:var(--radius);color:#fff;font-family:var(--font-main);font-size:14px;font-weight:600;cursor:pointer;"
      onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">Se connecter</button>
    <p style="color:var(--text-muted);font-size:11px;margin-top:16px;">Bureau : laissez l'identifiant vide</p>
    <div id="loginError" style="color:var(--accent-red);font-size:13px;margin-top:14px;display:none;"></div>
    <div id="loginLoading" style="color:var(--text-muted);font-size:13px;margin-top:14px;display:none;">
      <div class="spinner" style="width:20px;height:20px;border-width:2px;margin:0 auto 8px;"></div>Connexion...
    </div>
  </div>
</div>

<!-- 📊 DASHBOARD -->
<div class="container" id="app" style="display:none;">
  <div class="loading" id="loading"><div class="spinner"></div><div style="color:var(--text-muted);font-size:14px;">Chargement des données AMG...</div></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxwjvKD1dpxuOzhnzWIMzgwz3LV5k58-Qy5jgJui6umdJdE12Bm-BhW_6O4fIibceK_/exec';
let AUTH_PARAMS = '';
let USER_ROLE = '';

async function attemptLogin() {
  const loginInput = document.getElementById('loginInput');
  const passInput = document.getElementById('passwordInput');
  const errDiv = document.getElementById('loginError');
  const loadDiv = document.getElementById('loginLoading');
  const btn = document.getElementById('loginBtn');
  const login = loginInput.value.trim();
  const password = passInput.value.trim();
  errDiv.style.display = 'none';
  if (!password) { errDiv.textContent = 'Veuillez saisir le mot de passe.'; errDiv.style.display = 'block'; return; }
  btn.disabled = true; btn.style.opacity = '0.5'; loadDiv.style.display = 'block';
  try {
    let authStr = `password=${encodeURIComponent(password)}`;
    if (login) authStr += `&login=${encodeURIComponent(login)}`;
    const resp = await fetch(`${API_URL}?action=dashboard&${authStr}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    if (json.status === 'error') throw new Error(json.message || 'Identifiants invalides');
    if (json.status !== 'success' || !json.data) throw new Error('Identifiants invalides');
    AUTH_PARAMS = authStr;
    USER_ROLE = json.role || 'bureau';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    buildDashboard(json.data, json.campagne10K || null);
  } catch (e) {
    errDiv.textContent = '❌ ' + (e.message.includes('invalide') ? 'Identifiants incorrects' : e.message);
    errDiv.style.display = 'block'; passInput.value = ''; passInput.focus();
  } finally { btn.disabled = false; btn.style.opacity = '1'; loadDiv.style.display = 'none'; }
}

document.getElementById('loginInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('passwordInput').focus(); });
document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
document.getElementById('passwordInput').focus();

const fmt = n => n.toLocaleString('fr-FR', {minimumFractionDigits:0, maximumFractionDigits:0});
const fmtE = n => fmt(n) + ' €';
const isAdmin = () => USER_ROLE === 'admin';
const anonymize = name => isAdmin() ? name : '••••••';
const MOIS_FR = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

function parseDateAny(str) {
  if (!str) return null; str = str.trim();
  const fr = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (fr) return new Date(parseInt(fr[3]), parseInt(fr[2])-1, parseInt(fr[1]));
  const d = new Date(str); return isNaN(d.getTime()) ? null : d;
}
function fmtDate(d) { if (!d) return ''; return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
function sourceIcon(src) {
  if (!src) return '';
  const s = src.toLowerCase();
  if (s.includes('helloasso')) return '<span class="source-dot ha"></span>HelloAsso';
  if (s.includes('virement')) return '<span class="source-dot vir"></span>Virement';
  if (s.includes('paypal')) return '<span class="source-dot pp"></span>PayPal';
  if (s.includes('manuel') || s.includes('espèce')) return '<span class="source-dot man"></span>Manuel';
  return src;
}

async function loadData() {
  const resp = await fetch(`${API_URL}?action=dashboard&${AUTH_PARAMS}`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const json = await resp.json();
  if (json.status !== 'success' || !json.data) throw new Error(json.message || 'Erreur API');
  return { data: json.data, campagne10K: json.campagne10K || null };
}

function buildDashboard(data, campagne10K) {
  // ══════ CALCULS CLASSIQUES ══════
  let totalPromis=0, totalRecu=0, nbComplet=0, nbPartiel=0, nbNonPaye=0, nbSpontane=0;
  const sourceTotals={}, monthlyClassique={}, allPayments=[], alertsCritical=[], alertsWarning=[];

  data.forEach(d => {
    totalPromis += d.montantPromis; totalRecu += d.montantRecu;
    if (d.statut==='Complet') nbComplet++; else if (d.statut==='Partiel') nbPartiel++;
    else if (d.statut==='Non payé') nbNonPaye++; else if (d.statut==='Spontané') nbSpontane++;

    const hasV = (d.mtManuel !== undefined);
    if (hasV) {
      if (d.mtManuel > 0) sourceTotals["Manuel"] = (sourceTotals["Manuel"]||0) + d.mtManuel;
      if (d.mtHelloAsso > 0) sourceTotals["HelloAsso"] = (sourceTotals["HelloAsso"]||0) + d.mtHelloAsso;
      if (d.mtVirement > 0) sourceTotals["Virement"] = (sourceTotals["Virement"]||0) + d.mtVirement;
      if (d.mtPayPal > 0) sourceTotals["PayPal"] = (sourceTotals["PayPal"]||0) + d.mtPayPal;
    } else {
      (d.sources||'').split('+').forEach(s => { s=s.trim(); if (s && s!=='Aucun') sourceTotals[s] = (sourceTotals[s]||0) + d.montantRecu; });
    }

    if (d.datesPaiement && d.datesPaiement.trim()) {
      const parts = d.datesPaiement.split(',').map(s=>s.trim()).filter(Boolean);
      const nb = parts.length; const amt = nb>0 ? d.montantRecu/nb : 0;
      parts.forEach(dp => {
        const date = parseDateAny(dp);
        if (date) {
          const key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
          monthlyClassique[key] = (monthlyClassique[key]||0) + amt;
          allPayments.push({ date, dateStr: fmtDate(date), nom: d.nom, prenom: d.prenom, montant: amt, source: d.sources, campagne: 'classique' });
        }
      });
    }

    if (d.statut==='Non payé' && d.montantPromis>=3000) alertsCritical.push({nom:d.nom,prenom:d.prenom,montant:d.montantPromis,detail:`Promis ${fmtE(d.montantPromis)} — non payé`,campagne:'classique'});
    else if (d.statut==='Partiel' && d.reste>1000) alertsWarning.push({nom:d.nom,prenom:d.prenom,montant:d.reste,detail:`Reste ${fmtE(d.reste)} sur ${fmtE(d.montantPromis)}`,campagne:'classique'});
    else if (d.statut==='Non payé' && d.montantPromis>=1000) alertsWarning.push({nom:d.nom,prenom:d.prenom,montant:d.montantPromis,detail:`Promis ${fmtE(d.montantPromis)} — non payé`,campagne:'classique'});
  });

  // ══════ CALCULS 10K ══════
  const kpis10K = campagne10K && campagne10K.kpis ? campagne10K.kpis : { totalPrevu:0, totalRecu:0, reste:0, taux:'0', nbDonateurs:0, nbComplet:0, nbPartiel:0, nbNonPaye:0 };
  const has10K = campagne10K && campagne10K.data && campagne10K.data.length > 0;
  const monthly10K = {};

  if (has10K) {
    campagne10K.data.forEach(d => {
      if (d.datesPaiement && d.datesPaiement.trim()) {
        const parts = d.datesPaiement.split(',').map(s=>s.trim()).filter(Boolean);
        const nb = parts.length; const amt = nb>0 ? d.montantRecu/nb : 0;
        parts.forEach(dp => {
          const date = parseDateAny(dp);
          if (date) {
            const key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
            monthly10K[key] = (monthly10K[key]||0) + amt;
            allPayments.push({ date, dateStr: fmtDate(date), nom: d.nom, prenom: d.prenom, montant: amt, source: d.sources, campagne: '10K' });
          }
        });
      }
      if (d.statutPaiement === 'Non payé' && d.contributionPrevue >= 5000)
        alertsWarning.push({nom:d.nom,prenom:d.prenom,montant:d.contributionPrevue,detail:`10K: Prévu ${fmtE(d.contributionPrevue)} — non payé`,campagne:'10K'});
    });
  }

  // ══════ CONSOLIDATION ══════
  const totalRecuGlobal = totalRecu + kpis10K.totalRecu;
  const totalPromisGlobal = totalPromis + kpis10K.totalPrevu;
  const totalDonateurs = data.length;
  const nbDonateurs10K = kpis10K.nbDonateurs || 0;

  allPayments.sort((a,b) => b.date - a.date);
  const top15 = allPayments.slice(0, 15);

  alertsCritical.sort((a,b) => b.montant - a.montant);
  alertsWarning.sort((a,b) => b.montant - a.montant);
  const allAlerts = [...alertsCritical.slice(0,8).map(a=>({...a,type:'critical'})), ...alertsWarning.slice(0,7).map(a=>({...a,type:'warning'}))];

  // Monthly stacked
  const allMonthKeys = new Set([...Object.keys(monthlyClassique), ...Object.keys(monthly10K)]);
  const sortedMonths = [...allMonthKeys].sort();
  const last12 = sortedMonths.slice(-12);
  let maxMonth = 1;
  last12.forEach(k => { const t = (monthlyClassique[k]||0) + (monthly10K[k]||0); if (t > maxMonth) maxMonth = t; });

  // Gauges
  const OBJECTIF_CLASSIQUE = 525000;
  const tauxClassique = totalPromis > 0 ? (totalRecu / totalPromis * 100) : 0;
  const tauxObj = OBJECTIF_CLASSIQUE > 0 ? (totalRecu / OBJECTIF_CLASSIQUE * 100) : 0;
  const taux10K = kpis10K.totalPrevu > 0 ? (kpis10K.totalRecu / kpis10K.totalPrevu * 100) : 0;

  const gtcVar = v => v<30 ? 'var(--accent-red)' : v<60 ? 'var(--accent-orange)' : 'var(--accent-green)';

  // Source bars (classique)
  const srcEntries = Object.entries(sourceTotals).sort((a,b) => b[1] - a[1]);
  const totalSrc = srcEntries.reduce((s,e) => s + e[1], 0);

  // Donut
  const donutData = [{label:'Complet',value:nbComplet,color:'#4ade80'},{label:'Partiel',value:nbPartiel,color:'#fb923c'},{label:'Non payé',value:nbNonPaye,color:'#f87171'},{label:'Spontané',value:nbSpontane,color:'#a78bfa'}];

    <div class="header">

      <div class="header-meta">

        <span>MAJ : ${new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
        <span class="count-badge" style="${USER_ROLE==='admin'?'background:rgba(74,222,128,0.12);color:var(--accent-green)':'background:rgba(167,139,250,0.12);color:var(--accent-purple)'}">${USER_ROLE==='admin'?'🔑 Admin':'👁 Bureau'}</span>
        <button class="refresh-btn" onclick="loadData().then(r=>buildDashboard(r.data,r.campagne10K))">↻ Actualiser</button>

    <!-- ═══ CONSOLIDATED BAR ═══ -->

      <div>
        <div class="cb-title">Projet Mosquée — Total collecté</div>
        <div class="cb-value" style="color:var(--accent-green)">${fmtE(totalRecuGlobal)}</div>
        <div class="cb-label">sur ${fmtE(totalPromisGlobal)} promis/prévus — ${totalDonateurs + nbDonateurs10K} donateur(s)</div>
      </div>
      <div class="cb-divider"></div>
      <div>
        <div class="cb-title">Total promis/prévu</div>
        <div class="cb-value" style="color:var(--accent-blue)">${fmtE(totalPromisGlobal)}</div>
      </div>
      <div class="cb-divider"></div>
      <div>
        <div class="cb-title">Reste à collecter</div>
        <div class="cb-value" style="color:var(--accent-orange)">${fmtE(totalPromisGlobal - totalRecuGlobal)}</div>
      </div>
      <div class="cb-divider"></div>
      <div class="cb-progress">
        <div class="cb-title">Avancement global</div>
        <div class="cb-progress-bar">
          <div class="cb-progress-fill-blue" style="width:${totalPromisGlobal>0 ? Math.min(totalRecu/totalPromisGlobal*100,100) : 0}%"></div>
          <div class="cb-progress-fill-purple" style="width:${totalPromisGlobal>0 ? Math.min(kpis10K.totalRecu/totalPromisGlobal*100,100) : 0}%"></div>
        </div>
        <div class="cb-progress-legend">
          <span><span class="dot" style="background:var(--accent-blue)"></span> Classique : ${fmtE(totalRecu)}</span>
          <span><span class="dot" style="background:var(--accent-purple)"></span> 10K : ${fmtE(kpis10K.totalRecu)}</span>
        </div>
      </div>
    </div>

    <!-- ═══ DUAL COLUMNS ═══ -->
    <div class="dual-columns">
      <!-- CLASSIQUE -->
      <div class="channel-card">
        <div class="channel-header blue">
          <h2>💎 Promesses classiques</h2>
          <span class="ch-badge">${totalDonateurs} donateur(s)</span>
        </div>
        <div class="channel-body">
          <div class="channel-kpis">
            <div class="ck"><div class="ck-label">Promis</div><div class="ck-value" style="color:var(--accent-blue)">${fmtE(totalPromis)}</div></div>
            <div class="ck"><div class="ck-label">Reçu</div><div class="ck-value" style="color:var(--accent-green)">${fmtE(totalRecu)}</div></div>
            <div class="ck"><div class="ck-label">Reste</div><div class="ck-value" style="color:var(--accent-orange)">${fmtE(totalPromis - totalRecu)}</div></div>
            <div class="ck"><div class="ck-label">Taux</div><div class="ck-value" style="color:${gtcVar(tauxClassique)}">${tauxClassique.toFixed(1)}%</div></div>

                <defs><linearGradient id="gC" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:${gcColor(tauxObj)}"/><stop offset="100%" style="stop-color:${gcColor2(tauxObj)}"/></linearGradient></defs>
              </svg>
              <div class="gauge-center" style="color:${gtcVar(tauxObj)}">${tauxObj.toFixed(0)}%</div>
            </div>
            <div class="gauge-labels"><span>0%</span><span>50%</span><span>100%</span></div>
            <div class="gauge-detail"><strong>${fmtE(totalRecu)}</strong> collectés sur <strong>${fmtE(OBJECTIF_CLASSIQUE)}</strong></div>
          </div>
          <div class="channel-statuts">
            <div class="cs"><div class="cs-val" style="color:var(--accent-green)">${nbComplet}</div><div class="cs-lbl">Complets</div></div>
            <div class="cs"><div class="cs-val" style="color:var(--accent-orange)">${nbPartiel}</div><div class="cs-lbl">Partiels</div></div>
            <div class="cs"><div class="cs-val" style="color:var(--accent-red)">${nbNonPaye}</div><div class="cs-lbl">Non payés</div></div>
            <div class="cs"><div class="cs-val" style="color:var(--accent-purple)">${nbSpontane}</div><div class="cs-lbl">Spontanés</div></div>
          </div>
        </div>
      </div>

      <!-- 10K -->
      <div class="channel-card">
        <div class="channel-header purple">
          <h2>🎯 Campagne 10K</h2>
          <span class="ch-badge">${nbDonateurs10K} donateur(s)</span>
        </div>
        <div class="channel-body">
          ${has10K ? `
          <div class="channel-kpis">
            <div class="ck"><div class="ck-label">Prévu</div><div class="ck-value" style="color:var(--accent-purple)">${fmtE(kpis10K.totalPrevu)}</div></div>
            <div class="ck"><div class="ck-label">Reçu</div><div class="ck-value" style="color:var(--accent-green)">${fmtE(kpis10K.totalRecu)}</div></div>
            <div class="ck"><div class="ck-label">Reste</div><div class="ck-value" style="color:var(--accent-orange)">${fmtE(kpis10K.reste)}</div></div>
            <div class="ck"><div class="ck-label">Taux</div><div class="ck-value" style="color:${gtcVar(taux10K)}">${taux10K.toFixed(1)}%</div></div>
          </div>
          <div class="channel-gauge">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;text-align:center;">Objectif : ${fmtE(kpis10K.totalPrevu)}</div>
            <div class="gauge-wrapper">
              <svg class="gauge-svg" viewBox="0 0 180 110">
                <path d="M 16 100 A 74 74 0 0 1 164 100" class="gauge-bg"/>
                <path d="M 16 100 A 74 74 0 0 1 164 100" class="gauge-fill" id="gauge10K" stroke="url(#g10)" stroke-dasharray="${Math.PI*74}" stroke-dashoffset="${Math.PI*74}"/>
                <defs><linearGradient id="g10" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#7c3aed"/><stop offset="100%" style="stop-color:#a78bfa"/></linearGradient></defs>
              </svg>
              <div class="gauge-center" style="color:var(--accent-purple)">${taux10K.toFixed(0)}%</div>
            </div>
            <div class="gauge-labels"><span>0%</span><span>50%</span><span>100%</span></div>
            <div class="gauge-detail"><strong>${fmtE(kpis10K.totalRecu)}</strong> collectés sur <strong>${fmtE(kpis10K.totalPrevu)}</strong> prévus</div>
          </div>
          <div class="channel-statuts">
            <div class="cs"><div class="cs-val" style="color:var(--accent-green)">${kpis10K.nbComplet}</div><div class="cs-lbl">Complets</div></div>
            <div class="cs"><div class="cs-val" style="color:var(--accent-orange)">${kpis10K.nbPartiel}</div><div class="cs-lbl">Partiels</div></div>
            <div class="cs"><div class="cs-val" style="color:var(--accent-red)">${kpis10K.nbNonPaye}</div><div class="cs-lbl">Non payés</div></div>
          </div>
          ` : '<div class="empty-state">Aucune donnée Campagne 10K</div>'}
        </div>
      </div>
    </div>

    <!-- ═══ CHART + TIMELINE ═══ -->
    <div class="grid-2">
      <div class="card">
        <div class="section-title"><span>📈</span> Encaissements mensuels (Classique + 10K)</div>
        ${last12.length===0 ? '<div class="empty-state">Pas de données</div>' : `

          ${last12.map(key => {
            const vc = monthlyClassique[key]||0;
            const v10 = monthly10K[key]||0;
            const total = vc + v10;
            const hc = Math.max(0, (vc/maxMonth)*200);
            const h10 = Math.max(0, (v10/maxMonth)*200);
            const [y,m] = key.split('-');
            const mi = parseInt(m)-1;
            return `<div class="chart-bar-group">
              <div class="chart-bar-value">${total>0?fmt(Math.round(total))+'€':''}</div>
              <div class="chart-stack" style="height:${Math.max(4,hc+h10)}px" title="${MOIS_FR[mi]} ${y}: Classique ${fmtE(Math.round(vc))} + 10K ${fmtE(Math.round(v10))}">
                <div class="chart-seg purple" style="height:${h10}px"></div>
                <div class="chart-seg blue" style="height:${Math.max(hc>0?4:0,hc)}px"></div>

        </div>

    <!-- ═══ ALERTS ═══ -->
    <div class="card" style="margin-bottom:24px">

              <div class="alert-name">${anonymize(a.prenom)} ${anonymize(a.nom)} <span class="timeline-badge ${a.campagne==='10K'?'c10k':'classique'}" style="margin-left:4px">${a.campagne==='10K'?'10K':'Classique'}</span></div>

      </div>

    <div class="section-divider"></div>

    ${isAdmin() ? `
    <!-- ═══ DONUT + SOURCES ═══ -->
    <div class="grid-2">
      <div class="card">
        <div class="section-title"><span>📋</span> Répartition par statut (classique)</div>
        <div class="donut-container">
          <svg class="donut-svg" viewBox="0 0 140 140">${buildDonut(donutData,donutTotal,140)}</svg>
          <div class="donut-legend">${donutData.map(d => `<div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div><span>${d.label}</span><span class="legend-value" style="color:${d.color}">${d.value}</span></div>`).join('')}</div>

    ${has10K ? `

      <div class="controls">

      </div>
      <div class="table-wrapper" style="max-height:500px;overflow-y:auto">
        <table><thead><tr><th>Nom</th><th>Prénom</th><th>Statut contact</th><th style="text-align:right">Prévu</th><th style="text-align:right">Reçu</th><th style="text-align:right">Reste</th><th>Paiement</th><th>Source(s)</th></tr></thead><tbody id="table10KBody"></tbody></table>
      </div>
      <div id="table10KCount" style="margin-top:12px;font-size:12px;color:var(--text-muted)"></div>
    </div>
    ` : ''}
    ` : `
    <div class="card" style="text-align:center;padding:40px;">
      <div style="font-size:36px;margin-bottom:12px;">👁</div>
      <div style="font-size:16px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;">Mode consultation</div>
      <div style="font-size:13px;color:var(--text-muted);">Le détail des donateurs est réservé au compte administrateur.</div>
    </div>
    `}
  `;

  // Animate gauges
  setTimeout(() => {
    const g1 = document.getElementById('gaugeClassique');
    if (g1) { const arc = Math.PI*74; g1.style.strokeDashoffset = arc*(1-Math.min(tauxObj/100,1)); }
    const g2 = document.getElementById('gauge10K');
    if (g2) { const arc = Math.PI*74; g2.style.strokeDashoffset = arc*(1-Math.min(taux10K/100,1)); }
  }, 100);

  if (isAdmin()) {
    renderTable(data, 'all', '');
    setupFilters(data);
    if (has10K) { renderTable10K(campagne10K.data, 'all', ''); setupFilters10K(campagne10K.data); }
  }
}

function buildDonut(data, total, size) {
  const r = size/2 - 20;
  if (total===0) return `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e293b" stroke-width="18"/>`;
  let c = 0; const circ = 2*Math.PI*r;
  return data.map(d => { const p=d.value/total; const dash=p*circ; const off=-c*circ; c+=p; return `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${d.color}" stroke-width="18" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${off}" style="transition:all 1s ease-out"/>`; }).join('');
}

function renderTable(data, filter, search) {
  const tbody = document.getElementById('tableBody'); if (!tbody) return;
  let f = data;
  if (filter !== 'all') f = f.filter(d => d.statut === filter);
  if (search) { const s = search.toLowerCase(); f = f.filter(d => (d.nom||'').toLowerCase().includes(s) || (d.prenom||'').toLowerCase().includes(s) || (d.email||'').toLowerCase().includes(s)); }
  f.sort((a,b) => b.reste - a.reste);
  tbody.innerHTML = f.map(d => {
    const cls = d.statut==='Complet'?'complet':d.statut==='Partiel'?'partiel':d.statut==='Spontané'?'spontane':'nonpaye';
    return `<tr><td style="font-weight:500;color:var(--text-primary)">${d.nom}</td><td>${d.prenom}</td><td class="amount" style="color:var(--accent-blue)">${d.montantPromis>0?fmtE(d.montantPromis):'—'}</td><td class="amount" style="color:var(--accent-green)">${d.montantRecu>0?fmtE(d.montantRecu):'—'}</td><td class="amount" style="color:${d.reste>0?'var(--accent-red)':d.reste<0?'var(--accent-green)':'var(--text-muted)'}">${d.reste!==0?fmtE(d.reste):'—'}</td><td><span class="badge ${cls}">${d.statut}</span></td><td style="font-size:11px;color:var(--text-muted)">${d.sources||''}</td></tr>`;
  }).join('');
  document.getElementById('tableCount').textContent = `${f.length} donateur(s) affiché(s) sur ${data.length}`;
}

function setupFilters(data) {
  let af='all', st='';
  document.querySelectorAll('[data-filter]').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); af=btn.dataset.filter; renderTable(data,af,st); }); });
  const sb = document.getElementById('searchBox'); if (sb) sb.addEventListener('input', e => { st=e.target.value; renderTable(data,af,st); });
}

function renderTable10K(data10k, filter, search) {
  const tbody = document.getElementById('table10KBody'); if (!tbody) return;
  let f = data10k;
  if (filter !== 'all') f = f.filter(d => d.statutPaiement === filter);
  if (search) { const s = search.toLowerCase(); f = f.filter(d => (d.nom||'').toLowerCase().includes(s) || (d.prenom||'').toLowerCase().includes(s)); }
  f.sort((a,b) => b.reste - a.reste);
  tbody.innerHTML = f.map(d => {
    const cls = d.statutPaiement==='Complet'?'complet':d.statutPaiement==='Partiel'?'partiel':d.statutPaiement==='Don reçu'?'donrecu':'nonpaye';
    return `<tr><td style="font-weight:500;color:var(--text-primary)">${d.nom}</td><td>${d.prenom}</td><td style="font-size:10px;color:var(--text-muted)">${d.statutContact||''}</td><td class="amount" style="color:var(--accent-purple)">${d.contributionPrevue>0?fmtE(d.contributionPrevue):'—'}</td><td class="amount" style="color:var(--accent-green)">${d.montantRecu>0?fmtE(d.montantRecu):'—'}</td><td class="amount" style="color:${d.reste>0?'var(--accent-red)':'var(--text-muted)'}">${d.reste>0?fmtE(d.reste):'—'}</td><td><span class="badge ${cls}">${d.statutPaiement}</span></td><td style="font-size:11px;color:var(--text-muted)">${d.sources||''}</td></tr>`;
  }).join('');
  const ct = document.getElementById('table10KCount'); if (ct) ct.textContent = `${f.length} donateur(s) sur ${data10k.length}`;
}

function setupFilters10K(data10k) {
  let af='all', st='';
  document.querySelectorAll('[data-filter10k]').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('[data-filter10k]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); af=btn.dataset.filter10k; renderTable10K(data10k,af,st); }); });
  const sb = document.getElementById('search10K'); if (sb) sb.addEventListener('input', e => { st=e.target.value; renderTable10K(data10k,af,st); });
}
</script>
</body>
